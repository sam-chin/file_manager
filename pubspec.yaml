name: media_file_manager
description: "A professional media manager with SMB 0.0.9 and DLNA 0.0.8 support."
publish_to: 'none' # 防止意外上传到 pub.dev

# 版本号，根据你的 App 发布计划调整
version: 1.0.0+1

environment:
  # Flutter 3.19.0 对应的 SDK 范围
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # --- SMB 存储 (严格锁定你提供的 0.0.9 示例版本) ---
  smb_connect: 0.0.9

  # --- DLNA 投屏 (严格锁定你提供的 0.0.8 示例版本) ---
  dlna_dart: 0.0.8

  # --- 视频播放核心 (media_kit 方案) ---
  media_kit: ^1.1.10
  media_kit_video: ^1.1.4
  media_kit_libs_video: ^1.0.4

  # --- HTTP 代理服务器 (用于将 SMB 流转为视频播放器可读的 URL) ---
  shelf: ^1.4.1
  shelf_router: ^1.1.4

  # --- 状态管理与功能增强 ---
  provider: ^6.1.1
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2
  path: ^1.8.3
  sqflite: ^2.3.0
  path: ^1.8.3
# 解决老旧插件带来的版本冲突
# 特别是 dlna_dart 可能依赖了较旧的 xml 或 collection 包
dependency_overrides:
  xml: ^6.3.0
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  # 代码规范检查
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # 如果你有自定义图标或图片资源，在此处声明
  # assets:
  #   - assets/images/
  #   - assets/icons/

  # 字体配置示例
  # fonts:
  #   - family: MyFont
  #     fonts:
  #       - asset: fonts/MyFont-Regular.ttf