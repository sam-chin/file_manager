name: media_file_manager
description: "A professional media file manager with SMB, FTP, and DLNA support."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # SMB — 纯 Dart，无 native 依赖
  # 正确 API: SmbConnect.connectAuth() + connect.listFiles()
  smb_connect: 0.0.9

  # DLNA — 锁定 0.0.8，0.1.0 需要 Dart 3.8.0 与 Flutter 3.27.4 不兼容
  # API: DLNAManager() + setRefershCallback + startSearch
  dlna_dart: 0.0.8

  # FTP
  ftpconnect: ^2.0.3

  # 媒体播放 — 必须在 main() 调用 MediaKit.ensureInitialized()
  media_kit: ^1.1.11
  media_kit_video: ^1.2.5
  media_kit_libs_android_video: ^1.3.2

  # 数据库 — sqflite 替代 isar，彻底消灭 lStar 构建 bug
  sqflite: ^2.3.3
  path: ^1.9.0

  path_provider: ^2.1.4
  permission_handler: ^11.3.1
  http: ^1.2.2
  equatable: ^2.0.5
  flutter_bloc: ^8.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
