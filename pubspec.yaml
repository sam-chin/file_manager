name: media_file_manager
description: "A professional media file manager with SMB, FTP, and DLNA support."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 锁定 0.0.8，绝对不会触发 3.8.0 SDK 报错
  dlna_dart: 0.0.8

  # SMB 锁定 0.0.9，纯 Dart 实现
  smb_connect: 0.0.9

  # FTP 建议设为 any，让系统自动平衡
  ftpconnect: any

  # 播放引擎
  media_kit: ^1.1.10
  media_kit_video: ^1.2.4
  media_kit_libs_android_video: ^1.0.8

  # 其他基础库
  isar: ^3.1.0
  isar_flutter_libs: ^3.1.0
  path_provider: ^2.1.2
  permission_handler: ^11.3.1
  http: ^1.2.1
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  isar_generator: ^3.1.0
  build_runner: ^2.4.8
  analyzer: ^13.0.0

flutter:
  uses-material-design: true
