name: media_file_manager
description: "A professional media file manager with SMB, FTP, and DLNA support."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 锁定 0.0.8，绝对不会触发 3.8.0 SDK 报错
  dlna_dart: 0.0.8

  # SMB 锁定 0.0.9，纯 Dart 实现
  smb_connect: 0.0.9

  # FTP 建议设为 any，让系统自动平衡
  ftpconnect: any

  # 播放引擎 - 范围约束，避开 SDK 36
  media_kit: '>=1.1.0 <1.2.0'
  media_kit_video: '>=1.2.0 <1.3.0'
  # 关键：锁定在 <1.3.0，避免要求 SDK 36 的版本
  media_kit_libs_android_video: '>=1.0.0 <1.3.0'

  # 其他基础库
  isar: ^3.1.0
  isar_flutter_libs: ^3.1.0
  path_provider: ^2.1.2
  permission_handler: ^11.3.1
  http: ^1.2.1
  equatable: ^2.0.5
  flutter_bloc: ^8.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  # 显式锁定版本，适配 Dart 3.3.0 环境
  analyzer: 5.13.0
  
  # Isar 生成器
  isar_generator: 3.1.0
  build_runner: 2.4.8

flutter:
  uses-material-design: true
