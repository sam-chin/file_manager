name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: 34.0.0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          cache: true

      - name: Force Clean & Install dependencies (GitHub 缓存清理)
        run: |
          rm -f pubspec.lock
          flutter clean
          # GitHub 环境必须：强制清理 pub 缓存，避免 No such file or directory
          flutter pub cache clean --force
          flutter pub get
          # GitHub 环境必须：强制预下载所有平台二进制文件
          flutter precache

      - name: Generate Isar code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Fake Android SDK 36
        run: |
          cd $ANDROID_HOME/platforms
          if [ ! -d "android-36" ]; then
            sudo ln -s android-34 android-36
            echo "Faked Android SDK 36 using SDK 34"
          fi

      - name: Build APK
        run: |
          export GRADLE_OPTS="-Dhttp.connectionTimeout=600000 -Dhttp.socketTimeout=600000"
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
