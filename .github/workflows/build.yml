name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Flutter 3.27.4：ubuntu-latest 完全支持
      # smb_connect 在此版本 release build 正常
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # 换掉 isar 后不再需要 build_runner 代码生成这一步
      # 如果将来重新引入代码生成包再加回来

      # media_kit_libs_android_video 需要 SDK 35
      - name: Install Android SDK 35
        run: |
          SDKMANAGER=$(find $ANDROID_HOME/cmdline-tools -name "sdkmanager" 2>/dev/null | head -1)
          echo "y" | $SDKMANAGER "platforms;android-35" "build-tools;35.0.0"

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
